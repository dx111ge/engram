name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux-x86:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libssl-dev protobuf-compiler
      - name: Build release
        run: cargo build --release --features all,cuda
      - name: Strip binary
        run: strip target/release/engram
      - name: Package artifact
        run: |
          cp target/release/engram engram
          tar czf engram-linux-x86_64.tar.gz engram
      - name: Generate checksum
        run: sha256sum engram-linux-x86_64.tar.gz > engram-linux-x86_64.tar.gz.sha256
      - name: Upload to VirusTotal
        if: ${{ secrets.VT_API_KEY != '' }}
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          curl -sf --request POST \
            --url https://www.virustotal.com/api/v3/files \
            --header "x-apikey: ${VT_API_KEY}" \
            --form "file=@engram-linux-x86_64.tar.gz" || echo "VirusTotal upload failed (non-fatal)"
      - name: Upload to Gitea release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Create release if not exists
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${TAG}\", \"name\": \"Engram ${TAG}\"}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases" || true
          # Get release ID
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          # Upload archive
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @engram-linux-x86_64.tar.gz \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=engram-linux-x86_64.tar.gz"
          # Upload checksum
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @engram-linux-x86_64.tar.gz.sha256 \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=engram-linux-x86_64.tar.gz.sha256"

  build-linux-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Install cross-compilation deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu pkg-config protobuf-compiler
      - name: Configure linker
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml
      - name: Build release
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
        run: cargo build --release --features all,cuda --target aarch64-unknown-linux-gnu
      - name: Strip binary
        run: aarch64-linux-gnu-strip target/aarch64-unknown-linux-gnu/release/engram
      - name: Package artifact
        run: |
          cp target/aarch64-unknown-linux-gnu/release/engram engram
          tar czf engram-linux-aarch64.tar.gz engram
      - name: Generate checksum
        run: sha256sum engram-linux-aarch64.tar.gz > engram-linux-aarch64.tar.gz.sha256
      - name: Upload to VirusTotal
        if: ${{ secrets.VT_API_KEY != '' }}
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          curl -sf --request POST \
            --url https://www.virustotal.com/api/v3/files \
            --header "x-apikey: ${VT_API_KEY}" \
            --form "file=@engram-linux-aarch64.tar.gz" || echo "VirusTotal upload failed (non-fatal)"
      - name: Upload to Gitea release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${TAG}\", \"name\": \"Engram ${TAG}\"}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases" || true
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @engram-linux-aarch64.tar.gz \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=engram-linux-aarch64.tar.gz"
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @engram-linux-aarch64.tar.gz.sha256 \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=engram-linux-aarch64.tar.gz.sha256"

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install cross-compilation deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 protobuf-compiler
      - name: Configure linker
        run: |
          mkdir -p .cargo
          echo '[target.x86_64-pc-windows-gnu]' >> .cargo/config.toml
          echo 'linker = "x86_64-w64-mingw32-gcc"' >> .cargo/config.toml
      - name: Build release
        env:
          CC_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc
          CXX_x86_64_pc_windows_gnu: x86_64-w64-mingw32-g++
        run: cargo build --release --features all,directml --target x86_64-pc-windows-gnu
      - name: Strip binary
        run: x86_64-w64-mingw32-strip target/x86_64-pc-windows-gnu/release/engram.exe
      - name: Package artifact
        run: |
          cp target/x86_64-pc-windows-gnu/release/engram.exe engram.exe
          zip engram-windows-x86_64.zip engram.exe
      - name: Generate checksum
        run: sha256sum engram-windows-x86_64.zip > engram-windows-x86_64.zip.sha256
      - name: Upload to VirusTotal
        if: ${{ secrets.VT_API_KEY != '' }}
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          curl -sf --request POST \
            --url https://www.virustotal.com/api/v3/files \
            --header "x-apikey: ${VT_API_KEY}" \
            --form "file=@engram-windows-x86_64.zip" || echo "VirusTotal upload failed (non-fatal)"
      - name: Upload to Gitea release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${TAG}\", \"name\": \"Engram ${TAG}\"}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases" || true
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @engram-windows-x86_64.zip \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=engram-windows-x86_64.zip"
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @engram-windows-x86_64.zip.sha256 \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=engram-windows-x86_64.zip.sha256"

  build-macos:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            artifact: engram-macos-x86_64
          - target: aarch64-apple-darwin
            artifact: engram-macos-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - name: Install zig
        run: |
          sudo snap install zig --classic --beta || {
            ZIG_VERSION="0.13.0"
            curl -L "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" | tar -xJ
            sudo mv zig-linux-x86_64-${ZIG_VERSION}/zig /usr/local/bin/
            sudo mv zig-linux-x86_64-${ZIG_VERSION}/lib /usr/local/lib/zig
          }
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked
      - name: Build release
        run: cargo zigbuild --release --features all,coreml --target ${{ matrix.target }}
      - name: Package artifact
        run: |
          cp target/${{ matrix.target }}/release/engram engram
          zip ${{ matrix.artifact }}.zip engram
      - name: Generate checksum
        run: sha256sum ${{ matrix.artifact }}.zip > ${{ matrix.artifact }}.zip.sha256
      - name: Upload to VirusTotal
        if: ${{ secrets.VT_API_KEY != '' }}
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          curl -sf --request POST \
            --url https://www.virustotal.com/api/v3/files \
            --header "x-apikey: ${VT_API_KEY}" \
            --form "file=@${{ matrix.artifact }}.zip" || echo "VirusTotal upload failed (non-fatal)"
      - name: Upload to Gitea release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${TAG}\", \"name\": \"Engram ${TAG}\"}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases" || true
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @${{ matrix.artifact }}.zip \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${{ matrix.artifact }}.zip"
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @${{ matrix.artifact }}.zip.sha256 \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${{ matrix.artifact }}.zip.sha256"

  update-release-notes:
    runs-on: ubuntu-latest
    needs: [build-linux-x86, build-linux-aarch64, build-windows, build-macos]
    steps:
      - name: Build verification table and update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          # Download all .sha256 assets
          ASSETS=$(curl -sf \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets")

          BODY="## Engram ${TAG}\n\n"
          BODY+="### Verification\n\n"
          BODY+="| File | SHA-256 | VirusTotal |\n"
          BODY+="|------|---------|------------|\n"

          for ASSET_NAME in engram-linux-x86_64.tar.gz engram-linux-aarch64.tar.gz engram-windows-x86_64.zip engram-macos-x86_64.zip engram-macos-aarch64.zip; do
            SHA_URL=$(echo "$ASSETS" | python3 -c "
          import sys, json
          assets = json.load(sys.stdin)
          for a in assets:
              if a['name'] == '${ASSET_NAME}.sha256':
                  print(a['browser_download_url'])
                  break
          " 2>/dev/null || echo "")

            if [ -n "$SHA_URL" ]; then
              CHECKSUM=$(curl -sf -H "Authorization: token ${GITHUB_TOKEN}" "$SHA_URL" | awk '{print $1}')
              VT_LINK="https://www.virustotal.com/gui/file/${CHECKSUM}"
              BODY+="| \`${ASSET_NAME}\` | \`${CHECKSUM:0:16}...\` | [Scan Results](${VT_LINK}) |\n"
            fi
          done

          BODY+="\n**Verify downloads:**\n\`\`\`bash\n"
          BODY+="# Linux/macOS\nsha256sum -c engram-linux-x86_64.sha256\n"
          BODY+="# or compare manually\nsha256sum engram-linux-x86_64\n\`\`\`\n"

          # Update release body
          curl -sf -X PATCH \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(python3 -c "import json; print(json.dumps({'body': '''$(echo -e "$BODY")'''}))")" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}"
