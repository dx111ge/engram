name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux-x86:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libssl-dev protobuf-compiler
      - name: Build release
        run: cargo build --release --features all,cuda
      - name: Strip binary
        run: strip target/release/engram
      - name: Rename artifact
        run: cp target/release/engram engram-linux-x86_64
      - name: Upload to Gitea release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Create release if not exists
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${TAG}\", \"name\": \"Engram ${TAG}\"}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases" || true
          # Get release ID
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          # Upload asset
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @engram-linux-x86_64 \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=engram-linux-x86_64"

  build-linux-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Install cross-compilation deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu pkg-config protobuf-compiler
      - name: Configure linker
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml
      - name: Build release
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
        run: cargo build --release --features all,cuda --target aarch64-unknown-linux-gnu
      - name: Strip binary
        run: aarch64-linux-gnu-strip target/aarch64-unknown-linux-gnu/release/engram
      - name: Rename artifact
        run: cp target/aarch64-unknown-linux-gnu/release/engram engram-linux-aarch64
      - name: Upload to Gitea release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${TAG}\", \"name\": \"Engram ${TAG}\"}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases" || true
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @engram-linux-aarch64 \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=engram-linux-aarch64"

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install cross-compilation deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 protobuf-compiler
      - name: Configure linker
        run: |
          mkdir -p .cargo
          echo '[target.x86_64-pc-windows-gnu]' >> .cargo/config.toml
          echo 'linker = "x86_64-w64-mingw32-gcc"' >> .cargo/config.toml
      - name: Build release
        env:
          CC_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc
          CXX_x86_64_pc_windows_gnu: x86_64-w64-mingw32-g++
        run: cargo build --release --features all,directml --target x86_64-pc-windows-gnu
      - name: Strip binary
        run: x86_64-w64-mingw32-strip target/x86_64-pc-windows-gnu/release/engram.exe
      - name: Upload to Gitea release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${TAG}\", \"name\": \"Engram ${TAG}\"}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases" || true
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @target/x86_64-pc-windows-gnu/release/engram.exe \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=engram-windows-x86_64.exe"

  build-macos:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            artifact: engram-macos-x86_64
          - target: aarch64-apple-darwin
            artifact: engram-macos-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - name: Install zig
        run: |
          sudo snap install zig --classic --beta || {
            ZIG_VERSION="0.13.0"
            curl -L "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" | tar -xJ
            sudo mv zig-linux-x86_64-${ZIG_VERSION}/zig /usr/local/bin/
            sudo mv zig-linux-x86_64-${ZIG_VERSION}/lib /usr/local/lib/zig
          }
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked
      - name: Build release
        run: cargo zigbuild --release --features all,coreml --target ${{ matrix.target }}
      - name: Rename artifact
        run: cp target/${{ matrix.target }}/release/engram ${{ matrix.artifact }}
      - name: Upload to Gitea release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${TAG}\", \"name\": \"Engram ${TAG}\"}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases" || true
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @${{ matrix.artifact }} \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${{ matrix.artifact }}"
