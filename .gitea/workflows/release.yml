name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: engram-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            artifact: engram-linux-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        run: cargo install cross --locked
      - name: Build release
        run: cross build --release --features all --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/engram

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install cross
        run: cargo install cross --locked
      - name: Build release
        run: cross build --release --features all --target x86_64-pc-windows-gnu
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: engram-windows-x86_64
          path: target/x86_64-pc-windows-gnu/release/engram.exe

  build-macos:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            artifact: engram-macos-x86_64
          - target: aarch64-apple-darwin
            artifact: engram-macos-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install zig
        run: |
          sudo snap install zig --classic --beta || {
            ZIG_VERSION="0.13.0"
            curl -L "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" | tar -xJ
            sudo mv zig-linux-x86_64-${ZIG_VERSION}/zig /usr/local/bin/
            sudo mv zig-linux-x86_64-${ZIG_VERSION}/lib /usr/local/lib/zig
          }
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked
      - name: Build release
        run: cargo zigbuild --release --features all --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/engram
