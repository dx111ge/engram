name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check
        run: cargo check --workspace --features all
      - name: Test
        run: cargo test --workspace --features all
      - name: Clippy
        run: cargo clippy --workspace --features all -- -D warnings
      - name: Format
        run: cargo fmt --all -- --check
