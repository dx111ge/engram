<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>engram - Knowledge Graph</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="js/vis-network.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Navigation -->
  <nav id="main-nav">
    <div class="nav-brand">
      <a href="#/">
        <i class="fa-solid fa-brain"></i>
        <span>engram</span>
      </a>
    </div>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
      <i class="fa-solid fa-bars"></i>
    </button>
    <ul class="nav-links" id="nav-links">
      <li><a href="#/" data-route="/"><i class="fa-solid fa-house"></i> Home</a></li>
      <li><a href="#/explore" data-route="/explore"><i class="fa-solid fa-compass"></i> Explore</a></li>
      <li><a href="#/insights" data-route="/insights"><i class="fa-solid fa-chart-line"></i> Insights</a></li>
      <li><a href="#/system" data-route="/system"><i class="fa-solid fa-sliders"></i> System</a></li>
    </ul>
    <div class="nav-status">
      <span id="health-indicator" class="health-dot offline" title="Checking..."></span>
      <button class="btn-icon" id="settings-btn" title="System Settings">
        <i class="fa-solid fa-gear"></i>
      </button>
    </div>
  </nav>

  <!-- Main content area -->
  <main id="app">
    <!-- Views are rendered here by the router -->
  </main>

  <!-- Chat Toggle Button -->
  <button class="chat-toggle-btn" id="chat-toggle" title="Knowledge Chat">
    <i class="fa-solid fa-comments"></i>
  </button>

  <!-- Chat Panel -->
  <div class="chat-panel closed" id="chat-panel">
    <div class="chat-panel-header">
      <div style="display:flex;align-items:center;gap:0.5rem">
        <i class="fa-solid fa-brain" style="color:var(--accent-bright)"></i>
        <span style="font-weight:600">Knowledge Chat</span>
        <span id="chat-llm-status" class="feature-status"></span>
      </div>
      <div style="display:flex;gap:0.25rem">
        <button class="btn-icon" id="chat-clear-btn" title="Clear chat"><i class="fa-solid fa-trash-can"></i></button>
        <button class="btn-icon" id="chat-close-btn" title="Close"><i class="fa-solid fa-xmark"></i></button>
      </div>
    </div>
    <div class="chat-panel-messages" id="chat-messages"></div>
    <div id="chat-tool-status"></div>
    <div class="chat-panel-input">
      <textarea id="chat-input" rows="2" placeholder="Ask about your knowledge base..."></textarea>
      <button class="btn btn-primary" id="btn-chat-send" style="align-self:flex-end">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/home.js"></script>
  <script src="js/explore.js"></script>
  <script src="js/sources.js"></script>
  <script src="js/insights.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/system.js"></script>
  <script src="js/node.js"></script>
</body>
</html>
