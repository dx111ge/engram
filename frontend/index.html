<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>engram - Knowledge Graph</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="js/vis-network.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Navigation -->
  <nav id="main-nav">
    <div class="nav-brand">
      <a href="#/">
        <i class="fa-solid fa-brain"></i>
        <span>engram</span>
      </a>
    </div>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
      <i class="fa-solid fa-bars"></i>
    </button>
    <ul class="nav-links" id="nav-links">
      <li><a href="#/" data-route="/"><i class="fa-solid fa-house"></i> Home</a></li>
      <li><a href="#/explore" data-route="/explore"><i class="fa-solid fa-compass"></i> Explore</a></li>
      <li><a href="#/add" data-route="/add"><i class="fa-solid fa-plus-circle"></i> Add</a></li>
      <li><a href="#/sources" data-route="/sources"><i class="fa-solid fa-satellite-dish"></i> Sources</a></li>
      <li><a href="#/insights" data-route="/insights"><i class="fa-solid fa-lightbulb"></i> Insights</a></li>
      <li><a href="#/assess" data-route="/assess"><i class="fa-solid fa-scale-balanced"></i> Assess</a></li>
      <li><a href="#/chat" data-route="/chat"><i class="fa-solid fa-comments"></i> Chat</a></li>
      <li><a href="#/mesh" data-route="/mesh"><i class="fa-solid fa-network-wired"></i> Mesh</a></li>
      <li><a href="#/info" data-route="/info"><i class="fa-solid fa-circle-info"></i> Info</a></li>
    </ul>
    <div class="nav-status">
      <span id="health-indicator" class="health-dot offline" title="Checking..."></span>
      <button class="btn-icon" id="settings-btn" title="Settings">
        <i class="fa-solid fa-gear"></i>
      </button>
    </div>
  </nav>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <div class="modal-header">
        <h3><i class="fa-solid fa-gear"></i> API Settings</h3>
        <button class="btn-icon modal-close" data-modal="settings-modal"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <label for="api-url-input">API Base URL</label>
        <input type="text" id="api-url-input" placeholder="http://localhost:3030">
        <p class="help-text">The engram HTTP API endpoint. Default: http://localhost:3030</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary modal-close" data-modal="settings-modal">Cancel</button>
        <button class="btn btn-primary" id="save-api-url">Save</button>
      </div>
    </div>
  </div>

  <!-- Main content area -->
  <main id="app">
    <!-- Views are rendered here by the router -->
  </main>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/home.js"></script>
  <script src="js/explore.js"></script>
  <script src="js/add.js"></script>
  <script src="js/sources.js"></script>
  <script src="js/insights.js"></script>
  <script src="js/info.js"></script>
  <script src="js/mesh.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/assess.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/node.js"></script>
</body>
</html>
