name: Build macOS

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install deps
        run: brew install protobuf

      - name: Build release
        run: cargo build --release --features all,coreml --target aarch64-apple-darwin

      - name: Strip binary
        run: strip target/aarch64-apple-darwin/release/engram

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: engram-macos-aarch64
          path: target/aarch64-apple-darwin/release/engram

      - name: Package artifact
        run: |
          cp target/aarch64-apple-darwin/release/engram engram
          zip engram-macos-aarch64.zip engram

      - name: Generate checksum
        run: shasum -a 256 engram-macos-aarch64.zip > engram-macos-aarch64.zip.sha256

      - name: Upload to VirusTotal
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          curl -sf --request POST \
            --url https://www.virustotal.com/api/v3/files \
            --header "x-apikey: ${VT_API_KEY}" \
            --form "file=@engram-macos-aarch64.zip" || echo "VirusTotal upload failed (non-fatal)"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create "$TAG" --title "Engram $TAG" --notes "Build artifacts" --draft 2>/dev/null || true
          gh release upload "$TAG" engram-macos-aarch64.zip --clobber
          gh release upload "$TAG" engram-macos-aarch64.zip.sha256 --clobber

  update-release-notes:
    runs-on: ubuntu-latest
    needs: [build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Update release with verification table
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}

          # Download checksum files from release
          mkdir -p checksums
          for ARTIFACT in engram-macos-aarch64.zip; do
            gh release download "$TAG" --pattern "${ARTIFACT}.sha256" --dir checksums 2>/dev/null || true
          done

          # Build verification table
          BODY="## Engram ${TAG} -- macOS builds\n\n"
          BODY+="### Verification\n\n"
          BODY+="| File | SHA-256 | VirusTotal |\n"
          BODY+="|------|---------|------------|\n"

          for ARTIFACT in engram-macos-aarch64.zip; do
            if [ -f "checksums/${ARTIFACT}.sha256" ]; then
              CHECKSUM=$(awk '{print $1}' "checksums/${ARTIFACT}.sha256")
              VT_LINK="https://www.virustotal.com/gui/file/${CHECKSUM}"
              BODY+="| \`${ARTIFACT}\` | \`${CHECKSUM:0:16}...\` | [Scan Results](${VT_LINK}) |\n"
            fi
          done

          BODY+="\n**Verify downloads:**\n\`\`\`bash\nshasum -a 256 -c engram-macos-aarch64.zip.sha256\n\`\`\`\n"

          # Update release body (append to existing)
          EXISTING=$(gh release view "$TAG" --json body -q .body 2>/dev/null || echo "")
          printf "%s\n\n%b" "$EXISTING" "$BODY" | gh release edit "$TAG" --notes-file -
