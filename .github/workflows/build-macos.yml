name: Build macOS

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            artifact: engram-macos-x86_64
          - target: aarch64-apple-darwin
            artifact: engram-macos-aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install deps
        run: brew install protobuf

      - name: Build release
        run: cargo build --release --features all,coreml --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/engram

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/engram

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cp target/${{ matrix.target }}/release/engram ${{ matrix.artifact }}
          gh release upload "$TAG" "${{ matrix.artifact }}" --clobber || {
            gh release create "$TAG" --title "Engram $TAG" --draft "${{ matrix.artifact }}"
          }
