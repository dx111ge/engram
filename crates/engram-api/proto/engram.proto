syntax = "proto3";

package engram;

service EngramService {
  rpc Store(StoreRequest) returns (StoreResponse);
  rpc Relate(RelateRequest) returns (RelateResponse);
  rpc Query(QueryRequest) returns (QueryResponse);
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc GetNode(GetNodeRequest) returns (NodeResponse);
  rpc DeleteNode(DeleteNodeRequest) returns (DeleteResponse);
  rpc Reinforce(ReinforceRequest) returns (ReinforceResponse);
  rpc Correct(CorrectRequest) returns (CorrectResponse);
  rpc Decay(DecayRequest) returns (DecayResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc Stats(StatsRequest) returns (StatsResponse);
  rpc Ask(AskRequest) returns (AskResponse);
  rpc Tell(TellRequest) returns (TellResponse);
}

message StoreRequest {
  string entity = 1;
  string entity_type = 2;
  map<string, string> properties = 3;
  string source = 4;
  float confidence = 5;
}

message StoreResponse {
  uint64 node_id = 1;
  string label = 2;
  float confidence = 3;
}

message RelateRequest {
  string from = 1;
  string to = 2;
  string relationship = 3;
  float confidence = 4;
}

message RelateResponse {
  string from = 1;
  string to = 2;
  string relationship = 3;
  uint64 edge_slot = 4;
}

message QueryRequest {
  string start = 1;
  uint32 depth = 2;
  float min_confidence = 3;
  string direction = 4; // "out", "in", or "both" (default: "both")
}

message QueryResponse {
  repeated NodeHit nodes = 1;
  repeated EdgeHit edges = 2;
}

message NodeHit {
  uint64 node_id = 1;
  string label = 2;
  float confidence = 3;
  double score = 4;
  uint32 depth = 5;
}

message EdgeHit {
  string from = 1;
  string to = 2;
  string relationship = 3;
  float confidence = 4;
}

message SearchRequest {
  string query = 1;
  uint32 limit = 2;
}

message SearchResponse {
  repeated NodeHit results = 1;
  uint32 total = 2;
}

message GetNodeRequest {
  string label = 1;
}

message NodeResponse {
  uint64 node_id = 1;
  string label = 2;
  float confidence = 3;
  map<string, string> properties = 4;
  repeated EdgeHit edges_from = 5;
  repeated EdgeHit edges_to = 6;
}

message DeleteNodeRequest {
  string label = 1;
}

message DeleteResponse {
  bool deleted = 1;
  string entity = 2;
}

message ReinforceRequest {
  string entity = 1;
  string source = 2;
}

message ReinforceResponse {
  string entity = 1;
  float new_confidence = 2;
}

message CorrectRequest {
  string entity = 1;
  string reason = 2;
  string source = 3;
}

message CorrectResponse {
  string corrected = 1;
  repeated string propagated_to = 2;
}

message DecayRequest {}

message DecayResponse {
  uint32 nodes_decayed = 1;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string version = 2;
}

message StatsRequest {}

message StatsResponse {
  uint64 nodes = 1;
  uint64 edges = 2;
}

message AskRequest {
  string question = 1;
}

message AskResult {
  string label = 1;
  float confidence = 2;
  string relationship = 3;
  string detail = 4;
}

message AskResponse {
  string interpretation = 1;
  repeated AskResult results = 2;
}

message TellRequest {
  string statement = 1;
  string source = 2;
}

message TellResponse {
  string interpretation = 1;
  repeated string actions = 2;
}

// ── Streaming service (v1.1.0) ──

service EngramStreamService {
  // Server-streaming: subscribe to graph events
  rpc EventStream(EventStreamRequest) returns (stream GraphEventMessage);
  // Server-streaming: ingest progress
  rpc IngestProgress(IngestProgressRequest) returns (stream IngestProgressMessage);
  // Server-streaming: enrichment results
  rpc EnrichStream(EnrichStreamRequest) returns (stream EnrichmentMessage);
  // Client-streaming: bulk ingest
  rpc BulkIngest(stream IngestItem) returns (BulkIngestResponse);
}

message EventStreamRequest {
  repeated string topics = 1;
}

message GraphEventMessage {
  string event_type = 1;
  string data = 2;
  int64 timestamp = 3;
}

message IngestProgressRequest {
  string job_id = 1;
}

message IngestProgressMessage {
  string job_id = 1;
  string phase = 2;
  uint64 processed = 3;
  uint64 total = 4;
  float progress = 5;
  string error = 6;
}

message EnrichStreamRequest {
  string query = 1;
  float min_confidence = 2;
  string clearance = 3;
}

message EnrichmentMessage {
  string phase = 1;
  string status = 2;
  string data = 3;
}

message IngestItem {
  string text = 1;
  string source = 2;
  map<string, string> metadata = 3;
}

message BulkIngestResponse {
  uint64 ingested = 1;
  uint64 errors = 2;
  uint64 duration_ms = 3;
}

// ── Assessment service (v1.1.0) ──

service EngramAssessService {
  rpc CreateAssessment(CreateAssessmentRequest) returns (AssessmentResponse);
  rpc GetAssessment(GetAssessmentRequest) returns (AssessmentDetailResponse);
  rpc ListAssessments(ListAssessmentsRequest) returns (ListAssessmentsResponse);
  rpc EvaluateAssessment(EvaluateAssessmentRequest) returns (EvaluationResponse);
  rpc AddEvidence(AddEvidenceRequest) returns (EvidenceResponse);
  rpc AddWatch(AddWatchRequest) returns (WatchResponse);
  // Server-streaming: real-time score updates
  rpc AssessmentStream(AssessmentStreamRequest) returns (stream ScoreUpdate);
}

message CreateAssessmentRequest {
  string title = 1;
  string description = 2;
  string category = 3;
  string timeframe = 4;
  float initial_probability = 5;
  repeated string watches = 6;
}

message AssessmentResponse {
  string label = 1;
  float probability = 2;
  string status = 3;
}

message GetAssessmentRequest {
  string label = 1;
}

message AssessmentDetailResponse {
  string label = 1;
  string title = 2;
  string category = 3;
  string status = 4;
  string description = 5;
  string timeframe = 6;
  float current_probability = 7;
  int64 last_evaluated = 8;
  repeated ScorePointMessage history = 9;
  repeated string watches = 10;
}

message ScorePointMessage {
  int64 timestamp = 1;
  float probability = 2;
  float shift = 3;
  string trigger = 4;
  string reason = 5;
}

message ListAssessmentsRequest {
  string category = 1;
  string status = 2;
}

message ListAssessmentsResponse {
  repeated AssessmentSummaryMessage assessments = 1;
}

message AssessmentSummaryMessage {
  string label = 1;
  string title = 2;
  string category = 3;
  string status = 4;
  float current_probability = 5;
  int64 last_evaluated = 6;
  uint32 evidence_count = 7;
  uint32 watch_count = 8;
  float last_shift = 9;
}

message EvaluateAssessmentRequest {
  string label = 1;
}

message EvaluationResponse {
  string label = 1;
  float old_probability = 2;
  float new_probability = 3;
  float shift = 4;
}

message AddEvidenceRequest {
  string assessment_label = 1;
  string node_label = 2;
  string direction = 3;
  float confidence = 4;
}

message EvidenceResponse {
  bool added = 1;
  float new_probability = 2;
}

message AddWatchRequest {
  string assessment_label = 1;
  string entity_label = 2;
}

message WatchResponse {
  bool added = 1;
}

message AssessmentStreamRequest {
  repeated string labels = 1;
}

message ScoreUpdate {
  string label = 1;
  float probability = 2;
  float shift = 3;
  string trigger = 4;
  int64 timestamp = 5;
}
