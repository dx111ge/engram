[package]
name = "engram-ingest"
description = "Ingest pipeline for engram: NER, entity resolution, conflict detection"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = []
lang-detect = ["dep:whatlang"]  # Language detection via whatlang
anno = []       # Feature-gated ONNX NER backend (GLiNER2 + coreference)
spacy = []      # Feature-gated SpaCy HTTP sidecar integration
llm-ner = []    # Feature-gated LLM fallback NER

[dependencies]
engram-core = { path = "../engram-core" }
thiserror = { workspace = true }
tracing = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
regex = "1"
toml = "0.8"
whatlang = { version = "0.18", optional = true }

[dev-dependencies]
tempfile = "3"
